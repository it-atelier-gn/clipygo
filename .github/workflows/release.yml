name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  checks: write

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  build:
    needs: ci
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: clipygo-windows-x64
            bundle_ext: msi

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: clipygo-linux-x64
            bundle_ext: deb

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: clipygo-macos-arm64
            bundle_ext: dmg

    steps:
      - uses: actions/checkout@v6

      - name: Set version from tag
        shell: bash
        run: |
          node -e "
          const fs = require('fs');
          const v = process.env.GITHUB_REF_NAME.replace(/^v/, '');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          pkg.version = v;
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          const tauri = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
          tauri.version = v;
          fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(tauri, null, 2) + '\n');
          const cargo = fs.readFileSync('src-tauri/Cargo.toml', 'utf8');
          fs.writeFileSync('src-tauri/Cargo.toml', cargo.replace(/^version = \"[^\"]*\"/m, 'version = \"' + v + '\"'));
          "

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: npx tauri
          args: --target ${{ matrix.target }}

      - name: Package portable zip (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cp src-tauri/target/${{ matrix.target }}/release/clipygo.exe clipygo.exe
          7z a ${{ matrix.artifact }}-portable.zip clipygo.exe

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/rpm/*.rpm
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.tar.gz
            ${{ matrix.artifact }}-portable.zip

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/**/*
          generate_release_notes: true
          body: |
            ## Installation

            | File | Description |
            |---|---|
            | `*-setup.exe` | Windows installer (recommended) |
            | `*-portable.zip` | Windows portable — extract and run, no install needed |
            | `*.msi` | Windows MSI installer |
            | `*.deb` | Debian/Ubuntu package |
            | `*.AppImage` | Linux portable |
            | `*.dmg` | macOS disk image |

            > **Windows portable users:** requires the [WebView2 runtime](https://developer.microsoft.com/en-us/microsoft-edge/webview2/). Already present on Windows 11 and most Windows 10 systems. If the app doesn't start, install WebView2 first.
